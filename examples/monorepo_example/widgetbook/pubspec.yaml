name: widgetbook_workspace # cannot be named just "widgetbook"
description: A playground to streamline shared_ui with Widgetbook
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.4
  flutter: ^3.38.0

dependencies:
  flutter:
    sdk: flutter
  shared_ui:
    path: ../packages/shared_ui

  widgetbook:
    path: ../../../packages/widgetbook
  widgetbook_annotation:
    path: ../../../packages/widgetbook_annotation

dev_dependencies:
  build_runner: ^2.10.1
  widgetbook_generator:
    path: ../../../packages/widgetbook_generator

flutter:
  uses-material-design: true
